apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-server-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-server-app
  template:
    metadata:
      labels:
        app: go-server-app
    spec:
      containers:
      - name: go-server-app
        image: ghcr.io/panwarharsh15/devops-grind:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        envFrom:
          - configMapRef:
              name: go-server-config
          - secretRef:
              name: go-server-secret
        ports:
        - containerPort: 3000
