name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "readme"
      - "*.md"

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: panwarharsh15/devops-grind

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go modules
        run: |
          go mod tidy
          git diff --exit-code go.mod 

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: |
          go vet ./...

      - name: Run Go tests with race and coverage
        run: |
          go test -race -cover ./...

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: quality-check

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          docker build -t devops-grind:test .

      - name: Run container
        run: |
          docker run -d --name devops-grind-test -p 3000:3000 devops-grind:test

      - name: Wait for app
        run: |
          sleep 5

      - name: Test health endpoint
        run: |
          curl -f http://localhost:3000/health

      - name: Show container logs
        if: always()
        run: |
          docker logs devops-grind-test || true

      - name: Cleanup container
        if: always()
        run: |
          docker stop devops-grind-test || true
          docker rm devops-grind-test || true

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: docker-smoke-test

    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  

  trivy-scan:
    name: image-scanning
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/panwarharsh15/devops-grind:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'


    